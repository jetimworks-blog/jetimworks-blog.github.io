<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      (function() {
        var path = window.location.pathname;
        if (path !== '/') {
          sessionStorage.redirect = path + window.location.search + window.location.hash;
        }
        window.location.replace('/');
      })();
    </script>
  </head>
  <body>
  </body>
</html>
